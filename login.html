  <style>
  :root {
    --gold:#C8960C; --gold-l:#E8B422; --gold-d:#8A6508;
    --pink:#C8004A; --pink-l:#E8226A;
    --purple:#5C1A7A; --purple-l:#7E3AA0; --purple-d:#2E0045;
    --black:#07000D;
    --border:rgba(200,150,12,.18); --border-h:rgba(200,150,12,.4);
    --text:#EAE4F5; --text-dim:#9A8AB5; --text-xs:#665880;
    --surface:rgba(10,2,16,.9);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--black);
    color:var(--text);
    font-family:'DM Sans','Inter',system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* Subtle background */
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 80% 60% at 30% 40%, rgba(92,26,122,.25) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 70% 60%, rgba(200,0,74,.1) 0%, transparent 60%);
  }

  .page{
    position:relative;z-index:1;
    width:100%;max-width:420px;
    padding:1.5rem;
  }

  /* Logo / header */
  .login-header{
    text-align:center;margin-bottom:2rem;
  }
  .login-logo{
    font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;
    letter-spacing:.16em;color:var(--gold-l);
    text-decoration:none;display:block;margin-bottom:.3rem;
  }
  .login-sub{
    font-size:.72rem;color:var(--text-xs);font-family:'Inter',sans-serif;
    letter-spacing:.06em;
  }

  /* Card */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
    overflow:hidden;
  }

  .card-tabs{
    display:flex;border-bottom:1px solid var(--border);
  }
  .tab-btn{
    flex:1;padding:.7rem 1rem;
    font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;
    letter-spacing:.07em;text-transform:uppercase;
    background:none;border:none;color:var(--text-xs);
    cursor:pointer;transition:all .18s;
    border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab-btn.active{color:var(--gold-l);border-bottom-color:var(--gold);background:rgba(200,150,12,.04);}
  .tab-btn:hover:not(.active){color:var(--text-dim);}

  .tab-panel{display:none;padding:1.5rem;}
  .tab-panel.active{display:block;}

  /* Discord button */
  .discord-btn{
    width:100%;padding:.65rem 1rem;
    background:rgba(88,101,242,.15);
    border:1px solid rgba(88,101,242,.35);
    color:#8B9DFF;
    font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;
    letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;transition:all .18s;
    display:flex;align-items:center;justify-content:center;gap:.6rem;
    margin-bottom:1.25rem;
  }
  .discord-btn:hover{background:rgba(88,101,242,.25);color:#fff;border-color:rgba(88,101,242,.6);}
  .discord-btn svg{flex-shrink:0;}

  .divider{
    display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;
  }
  .divider::before,.divider::after{
    content:'';flex:1;height:1px;background:var(--border);
  }
  .divider span{
    font-family:'Inter',sans-serif;font-size:.62rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--text-xs);white-space:nowrap;
  }

  /* Form */
  .fg{margin-bottom:.85rem;}
  .fl{
    display:block;font-family:'Inter',sans-serif;
    font-size:.62rem;font-weight:600;
    letter-spacing:.13em;text-transform:uppercase;
    color:var(--gold-d);margin-bottom:.28rem;
  }
  .fi{
    width:100%;background:rgba(7,0,13,.5);
    border:1px solid var(--border);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:.9rem;
    padding:.52rem .78rem;outline:none;
    transition:border-color .18s,box-shadow .18s;
  }
  .fi:focus{border-color:var(--gold-d);box-shadow:0 0 0 2px rgba(200,150,12,.1);}

  .submit-btn{
    width:100%;padding:.58rem 1rem;
    background:var(--gold);color:#07000D;
    font-family:'Inter',sans-serif;font-size:.76rem;font-weight:700;
    letter-spacing:.07em;text-transform:uppercase;
    border:none;cursor:pointer;
    transition:all .18s;margin-top:.25rem;
    clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  }
  .submit-btn:hover{background:var(--gold-l);transform:translateY(-1px);}
  .submit-btn:disabled{opacity:.5;cursor:default;transform:none;}

  .form-msg{
    font-family:'Inter',sans-serif;font-size:.75rem;
    text-align:center;margin-top:.65rem;min-height:1.2em;
    letter-spacing:.04em;
  }
  .form-msg.ok{color:#81C784;} .form-msg.err{color:var(--pink-l);}

  .hint{
    font-size:.74rem;color:var(--text-xs);font-style:italic;
    margin-top:.25rem;font-family:'DM Sans',sans-serif;
  }

  .back-link{
    display:block;text-align:center;margin-top:1.25rem;
    font-family:'Inter',sans-serif;font-size:.7rem;
    color:var(--text-xs);text-decoration:none;letter-spacing:.05em;
    transition:color .18s;
  }
  .back-link:hover{color:var(--gold-l);}

  /* Password strength */
  .pw-strength{
    height:2px;margin-top:.3rem;
    background:rgba(94,26,122,.2);border-radius:1px;overflow:hidden;
  }
  .pw-bar{
    height:100%;width:0%;border-radius:1px;
    transition:width .3s,background .3s;
  }
  
  @media (max-width: 500px) {
    .tab-btn    { min-height: 44px; }
    .discord-btn{ min-height: 48px; font-size: .82rem; }
    .submit-btn { min-height: 48px; }
    .fi         { min-height: 44px; font-size: 16px; }
    .page       { padding: 1rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="card">
    <div class="card-tabs">

      <button class="tab-btn" onclick="switchTab('register',this)">Register</button>
    </div>

    <!-- SIGN IN TAB -->
    <div class="tab-panel active" id="tab-login">
      <button class="discord-btn" onclick="discordLogin()">

      <div class="divider"><span>or use email</span></div>

        <label class="fl">Email</label>
        <input class="fi" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email"/>

        <label class="fl">Password</label>
        <input class="fi" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password"/>

        </svg>
        Register with Discord
      </button>
      <div class="divider"><span>or use email</span></div>
      <div class="fg">
        <label class="fl">Username</label>
        <input class="fi" id="regUsername" type="text" placeholder="Your display name" maxlength="32" autocomplete="username"/>
        <p class="hint">This is what other players will see.</p>
      </div>
      <div class="fg">
        <label class="fl">Email</label>
        <input class="fi" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email"/>

               autocomplete="new-password" oninput="checkPwStrength(this.value)"/>
        <div class="pw-strength"><div class="pw-bar" id="pwBar"></div></div>
      </div>
      <div class="fg">
        <label class="fl">Confirm Password</label>
        <input class="fi" id="regConfirm" type="password" placeholder="Repeat password" autocomplete="new-password"/>
      </div>
      <button class="submit-btn" id="registerBtn" onclick="emailRegister()">Create Account</button>
      <p class="form-msg" id="registerMsg"></p>
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to A JoJo Roleplay</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://azzonqzxmtoilhqsrshq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6em9ucXp4bXRvaWxocXNyc2hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MzE2NjcsImV4cCI6MjA4OTIwNzY2N30.Dm5AjdtiEMraiajsE_Pjut7KRdvmrYAjcL5B2BfqXME';

const sb = window.supabase
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: {
        autoRefreshToken:   true,
        persistSession:     true,
        detectSessionInUrl: true,
      }
    })
  : null;

/* ── Helpers ────────────────────────────────────────────────── */
function showMsg(id, text, isErr) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'form-msg ' + (isErr ? 'err' : 'ok');
}
function setBusy(btnId, busy, label) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled    = busy;
  btn.textContent = busy ? 'Please wait…' : label;
}
function goHome() {
  window.location.replace('index.html');
}

/* ── Tab switching ───────────────────────────────────────────── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

/* ── Discord OAuth ───────────────────────────────────────────── */
async function discordLogin() {
  if (!sb) { showMsg('loginMsg','Auth not available.',true); return; }
  // Redirect BACK to login.html so we handle the token here
  const here = window.location.origin + '/login.html';
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'discord',
    options: { redirectTo: here, scopes: 'identify email' }
  });
  if (error) showMsg('loginMsg', error.message, true);
}

/* ── Email Sign In ───────────────────────────────────────────── */
async function emailLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  if (!email || !pass) { showMsg('loginMsg','Enter email and password.',true); return; }
  if (!sb)             { showMsg('loginMsg','Auth not available.',true); return; }

  setBusy('loginBtn', true, 'Sign In');
  showMsg('loginMsg', '', false);

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setBusy('loginBtn', false, 'Sign In');

  if (error) { showMsg('loginMsg', error.message, true); return; }
  if (data?.session) {
    showMsg('loginMsg', 'Signed in! Taking you to the site…', false);
    setTimeout(goHome, 800);
  }
}

/* ── Email Register ──────────────────────────────────────────── */
async function emailRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const pass     = document.getElementById('regPassword').value;
  const confirm  = document.getElementById('regConfirm').value;

  if (!username)        { showMsg('registerMsg','Username is required.',true); return; }
  if (!email)           { showMsg('registerMsg','Email is required.',true); return; }
  if (pass.length < 8)  { showMsg('registerMsg','Password must be at least 8 characters.',true); return; }
  if (pass !== confirm) { showMsg('registerMsg','Passwords do not match.',true); return; }
  if (!sb)              { showMsg('registerMsg','Auth not available.',true); return; }

  setBusy('registerBtn', true, 'Create Account');
  showMsg('registerMsg', '', false);

  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: {
      data: { full_name: username },
      emailRedirectTo: window.location.origin + '/login.html',
    }
  });
  setBusy('registerBtn', false, 'Create Account');

  if (error) { showMsg('registerMsg', error.message, true); return; }

  if (data?.session) {
    // Email confirmation is OFF — signed in immediately
    showMsg('registerMsg', '✓ Welcome! Taking you to the site…', false);
    setTimeout(goHome, 800);
  } else {
    // Email confirmation is ON
    showMsg('registerMsg',
      '✓ Account created! Check your email for a confirmation link, then sign in.',
      false
    );
    // Clear the form so they don't accidentally submit again
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirm').value  = '';
  }
}

/* ── Password strength ───────────────────────────────────────── */
function checkPwStrength(pw) {
  const bar = document.getElementById('pwBar');
  if (!bar) return;
  let score = 0;
  if (pw.length >= 8)          score++;
  if (pw.length >= 12)         score++;
  if (/[A-Z]/.test(pw))        score++;
  if (/[0-9]/.test(pw))        score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const cols = ['#EF5350','#FF7043','#FFB300','#66BB6A','#26A69A'];
  bar.style.width      = (score * 20) + '%';
  bar.style.background = cols[score - 1] || '#333';
}

/* ── Enter key ───────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.tab-panel.active')?.id;
  if (active === 'tab-login')    emailLogin();
  if (active === 'tab-register') emailRegister();
});

/* ── Page load: ONLY handle OAuth callback, nothing else ────── */
// We deliberately do NOT redirect already-logged-in users from this page.
// index.html is where they go if they're already in — login.html is
// only for signing in / registering. No auto-redirects on load.
(async () => {
  if (!sb) return;

  const url = window.location.href;
  const isOAuthCallback = url.includes('?code=')
    || url.includes('#access_token=')
    || url.includes('&code=');

  if (!isOAuthCallback) return; // Not an OAuth callback — show the form normally

  // This IS an OAuth callback from Discord
  // Replace the card with a loading state
  const card = document.querySelector('.card');
  if (card) {
    card.innerHTML = `
      <div style="padding:3rem 2rem;text-align:center;">
        <div style="font-family:'Cinzel',serif;font-size:1rem;color:#E8B422;margin-bottom:.75rem;">
          A JoJo Roleplay
        </div>
        <p style="font-family:'Inter',sans-serif;font-size:.85rem;color:#9A8AB5;margin-bottom:1.25rem;">
          Signing you in…
        </p>
        <div style="width:40px;height:2px;background:linear-gradient(90deg,#5C1A7A,#C8004A);margin:0 auto;animation:ticker 1s linear infinite;"></div>
      </div>`;
  }

  // Wait for Supabase to process the token (detectSessionInUrl handles this)
  // Poll getSession instead of relying on onAuthStateChange timing
  let attempts = 0;
  const maxAttempts = 20; // 10 seconds max
  const poll = setInterval(async () => {
    attempts++;
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      clearInterval(poll);
      goHome();
      return;
    }
    if (attempts >= maxAttempts) {
      clearInterval(poll);
      // Timed out — show error and let them try again
      if (card) {
        card.innerHTML = `
          <div style="padding:2rem;text-align:center;">
            <p style="font-family:'Inter',sans-serif;font-size:.85rem;color:#E8226A;margin-bottom:1rem;">
              Sign-in timed out. Please try again.
            </p>
            <a href="login.html" style="font-family:'Inter',sans-serif;font-size:.8rem;color:#C8960C;">
              Back to login →
            </a>
          </div>`;
      }
    }
  }, 500);
})();
</script>
